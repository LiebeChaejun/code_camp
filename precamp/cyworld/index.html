<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>윤주희님의 미니홈피 :: 사이좋은 사람들 싸이월드</title>
    <link rel="stylesheet" href="./styles/index.css" />
  </head>
  <body>
    <div class="background">
      <div class="outerBox">
        <div class="wrapper">
          <div class="wrapper__left">
            <div class="wrapper__left__header">
              <div class="today">
                <span>TODAY</span>
                <span>0</span>
                <span>| TOTAL</span>
                <span>0</span>
              </div>
            </div>
            <div class="wrapper__left__body">
              <div class="left__body__header">
                <div class="left__body__header__gray"></div>
                <div class="left__body__header__line"></div>
              </div>
              <div class="left__body__profile">
                <div class="profile__box">
                  <div class="profile_detail">
                    <img src="./images/user.png" alt="user" />
                    <p>윤주희</p>
                  </div>
                  <div class="profile_detail">
                    <img src="./images/phone.png" alt="" />
                    <p>Phone</p>
                  </div>
                  <div class="profile_detail">
                    <img src="./images/email.png" alt="email" />
                    <p>E-mail</p>
                  </div>
                  <div class="profile_detail">
                    <img src="./images/instagram.png" alt="sns" />
                    <p>인스타</p>
                  </div>
                </div>
              </div>
              <div class="left__body__footer">
                <div class="wrapper__feel">
                  <div class="feel_title">오늘의 기분</div>
                  <select name="feel" id="">
                    <option value="">기쁨 ☺️</option>
                    <option value="">슬픔 🥲</option>
                    <option value="">화남 😡</option>
                    <option value="">분노 🤯</option>
                  </select>
                </div>
              </div>
            </div>
          </div>
          <div class="wrapper__right">
            <div class="wrapper__right__header">
              <div class="right__header__title">사이좋은 사람들, 싸이월드</div>
              <div class="right__header__setting">사생활보호설정</div>
            </div>
            <div class="wrapper__right__body">
              <iframe src="" frameborder="0"></iframe>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
