<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PreCamp final Project</title>
    <link rel="stylesheet" href="./final.css" />
  </head>
  <body>
    <section class="signupForm">
      <h1>코드캠프 회원가입</h1>
      <form action="submit">
        <input
          type="text"
          placeholder="이메일을 입력해주세요."
          class="input_profile"
        />
        <input
          type="text"
          placeholder="이름을 입력해주세요."
          class="input_profile"
        />
        <input
          type="password"
          placeholder="비밀번호를 입력해주세요."
          class="input_profile"
        />
        <input
          type="password"
          placeholder="비밀번호를 다시 입력해 주세요."
          class="input_profile"
        />
        <div class="phone_number">
          <input type="text" id="phone1" />
          <p>-</p>
          <input type="text" id="phone2" />
          <p>-</p>
          <input type="text" id="phone3" />
        </div>
        <div class="auth_container">
          <div class="auth_box">
            <p>000000</p>
            <button class="auth_number">인증번호 전송</button>
          </div>
          <div class="auth_box">
            <p>2:23</p>
            <button class="auth_timer">인증 완료</button>
          </div>
        </div>
        <select name="region" id="region">
          <option value="" disabled selected>지역을 선택해주세요.</option>
          <option value="">서울</option>
          <option value="">부산</option>
          <option value="">인천</option>
        </select>
        <div class="form_gender">
          <input type="radio" name="gender" />여성
          <input type="radio" name="gender" />남성
        </div>
      </form>
      <button class="submit_button" type="submit">가입하기</button>
    </section>
    <script src="./final.js"></script>
  </body>
</html>
