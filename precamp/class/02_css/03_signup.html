<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 폼 CSS 적용</title>
    <link rel="stylesheet" href="./03_signup.css" />
  </head>
  <body>
    <div class="screen">
      <form action="">
        <h1>회원 가입을 위해 정보를 입력해주세요</h1>
        <div class="input-box">
          <div class="input">
            <label for="email">*이메일</label>
            <input type="text" id="email" />
          </div>

          <div class="input">
            <label for="name">*이름</label>
            <input type="text" id="name" />
          </div>

          <div class="input">
            <label for="password">*비밀번호</label>
            <input class="pw" type="password" id="password" />
          </div>

          <div class="input">
            <label for="pwcheck">*비밀번호 확인</label>
            <input class="pw" type="password" id="pwcheck" />
          </div>
        </div>
        <br />
        <div>
          <input type="radio" name="gender" />여성
          <input type="radio" name="gender" />남성
        </div>
        <div>
          <input type="checkbox" name="" id="" />이용약관 개인정보 수집 및 이용,
          마케팅 활용 선택에 모두 동의합니다.
        </div>
        <hr />
        <button>가입하기</button>
      </form>
    </div>
  </body>
</html>
