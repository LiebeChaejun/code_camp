<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Model</title>
    <style>
      * {
        box-sizing: border-box;
      }

      /* 기본값은 content-box */
      div {
        width: 80px;
        height: 80px;
        border: 1px solid coral;
        padding: 10px;
      }

      #contentBox {
        box-sizing: content-box;
      }

      #borderBox {
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div id="contentBox">Box 1</div>
    <div>Box 2</div>
    <div id="borderBox">Box 3</div>
  </body>
</html>
