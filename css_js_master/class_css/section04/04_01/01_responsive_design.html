<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>반응형 디자인 실습</title>
    <style>
      .box {
        /* 상자길이를 최대 1000px로 하고 그보다 작은 것도 ok */
        max-width: 1000px;
        background-color: lightblue;
      }

      .puppy {
        width: 20%;
        height: 150px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <img class="puppy" src="./img/puppy.jpeg" alt="" /><img
        class="puppy"
        src="./img/puppy.jpeg"
        alt=""
      /><img class="puppy" src="./img/puppy.jpeg" alt="" /><img
        class="puppy"
        src="./img/puppy.jpeg"
        alt=""
      />
    </div>
  </body>
</html>
