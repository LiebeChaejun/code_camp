<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>미디어 쿼리와 순서변경 실습</title>
    <style>
      * {
        box-sizing: border-box;
      }

      .box {
        display: flex;

        width: 1000px;
        height: 500px;
      }

      .image_box {
        background-color: lightblue;
        padding: 50px;
      }

      .puppy {
        width: 150px;
        height: 150px;
      }

      .input_box {
        width: 300px;
        height: 500px;

        background-color: lightcoral;
        padding: 10px;
      }

      @media (max-width: 500px) {
        .box {
          flex-direction: column;
        }

        .image_box {
          order: 2;
        }

        .input_box {
          order: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="image_box">
        <img class="puppy" src="./img/puppy.jpeg" alt="" /><img
          class="puppy"
          src="./img/puppy.jpeg"
          alt=""
        /><img class="puppy" src="./img/puppy.jpeg" alt="" /><img
          class="puppy"
          src="./img/puppy.jpeg"
          alt=""
        />
      </div>
      <div class="input_box">
        <h1>강아지 옷 등록하기</h1>
        옷 이름: <input type="text" />
        <button>등록하기</button>
      </div>
    </div>
  </body>
</html>
