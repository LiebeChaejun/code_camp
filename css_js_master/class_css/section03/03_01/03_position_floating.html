<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>position floating(fixed) 실습</title>
    <style>
      .floating_button {
        width: 100px;
        height: 100px;
        background-color: lightblue;
        border-radius: 100%;
        cursor: pointer;

        position: fixed;
        right: 10px;
        bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div class="floating_button"></div>
  </body>
</html>
