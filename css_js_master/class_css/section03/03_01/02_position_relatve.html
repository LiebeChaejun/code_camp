<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>position 상대위치 실습</title>
    <style>
      .box1 {
        width: 200px;
        height: 200px;
        background-color: lightblue;
      }

      .box2 {
        position: relative;
        width: 10px;
        height: 10px;
        background-color: lightcoral;
        cursor: pointer;

        top: -200px;
        left: 190px;
      }
    </style>
  </head>
  <body>
    <div class="box1"></div>
    <div class="box2"></div>
  </body>
</html>
