<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toast 실습</title>
    <style>
      .copy_message {
        width: 300px;
        height: 30px;
        background-color: lightblue;
        border-radius: 10px;
        text-align: center;
        line-height: 30px;

        /* 애니메이션 적용 */
        animation-name: ani;
        animation-duration: 2s;
      }

      @keyframes ani {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="copy_message">복사되었습니다.</div>
  </body>
</html>
