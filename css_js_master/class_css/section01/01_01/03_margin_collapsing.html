<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마진 상쇄 실습</title>
    <style>
      .box {
        width: 300px;
        height: 300px;
      }

      .box1 {
        background-color: lightblue;
        /* 상하좌우 마진 100px */
        margin: 100px;
      }

      .box2 {
        background-color: yellow;
        /* 상하좌우 마진 80px */
        margin: 80px;
      }
    </style>
  </head>
  <body>
    <div class="box box1"></div>
    <div class="box box2"></div>
  </body>
</html>
