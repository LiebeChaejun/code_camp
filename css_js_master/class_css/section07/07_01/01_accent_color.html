<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>엑센트 컬러 실습</title>
    <style>
      .checkbox {
        accent-color: green;
      }

      .radio {
        accent-color: red;
      }

      .range {
        accent-color: yellow;
      }

      .progress {
        accent-color: orange;
      }
    </style>
  </head>
  <body>
    <input class="checkbox" type="checkbox" />
    <input class="radiobutton" type="radio" />
    <input class="range" type="range" max="100" value="70" />
    <progress class="progress" max="100" value="70"></progress>
  </body>
</html>
