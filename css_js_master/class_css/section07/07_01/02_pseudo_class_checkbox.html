<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>토글 실습</title>
    <style>
      .checkbox {
        appearance: none;

        width: 40px;
        height: 24px;
        background-color: lightgray;
        border-radius: 20px;

        padding: 2px;
      }

      .checkbox::after {
        display: block;

        content: "";
        width: 20px;
        height: 20px;
        background-color: white;
        border-radius: 50%;

        transition: transform 0.3s;
      }

      .checkbox:checked {
        background-color: lightblue;
      }

      .checkbox:checked::after {
        transform: translateX(80%);
      }
    </style>
  </head>
  <body>
    <input type="checkbox" class="checkbox" />
  </body>
</html>
