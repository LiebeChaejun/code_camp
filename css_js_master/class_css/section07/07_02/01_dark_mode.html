<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>다크 모드 실습</title>
    <style>
      .dark_mode {
        color: white;
        background-color: black;
      }

      .form_box {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
    </style>
    <script>
      const darkMode = () => {
        document.body.classList.toggle("dark_mode");
      };
    </script>
  </head>
  <body>
    <input type="checkbox" onclick="darkMode()" />다크모드

    <br />
    <br />

    <form action="" class="form_box">
      이메일: <input type="text" /> 비밀번호: <input type="password" />
      <button>회원가입</button>
    </form>
  </body>
</html>
