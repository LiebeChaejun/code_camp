<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>calendar selection with validation</title>
    <style>
      .calendar {
        position: relative;
      }

      .calendar::-webkit-calendar-picker-indicator {
        background: transparent;

        position: absolute;
        top: 0;
        left: 0;
        width: 100%;

        z-index: 10;
      }

      /* 기본 연 월 일 지우기 */
      .calendar::-webkit-datetime-edit-text,
      ::-webkit-datetime-edit-year-field,
      ::-webkit-datetime-edit-month-field,
      ::-webkit-datetime-edit-day-field {
        display: none;
      }

      /* 플레이스 홀더 추가하기 */
      .calendar::after {
        content: attr(data_placeholder);

        position: absolute;
        top: 0;
        left: 0;
      }

      /* 날짜 선택 여부 */
      .calendar:valid::-webkit-datetime-edit-text,
      :valid::-webkit-datetime-edit-year-field,
      :valid::-webkit-datetime-edit-month-field,
      :valid::-webkit-datetime-edit-day-field {
        display: inline; /* 바닥에 숨겨졍 있는 선택된 날짜(연도, 월, 일) */
        color: blue;
      }
      .calendar:valid::after {
        display: none; /* 위에 덮여져 있는 플레이스 홀더 숨기자! */
      }

      .calendar:invalid::after {
        color: red;
      }
    </style>
  </head>
  <body>
    <input
      type="date"
      class="calendar"
      data_placeholder="생일을 선택하세요"
      required
    />
  </body>
</html>
