<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>페이지 이동효과 실습</title>
    <style>
      .box {
        background-color: lightgoldenrodyellow;
        width: 1000px;
        height: 200px;
        margin: 10px;
      }

      @keyframes backPageAnimation {
        from {
          transform: translateX(0%);
        }
        to {
          transform: translateX(-100%);
        }
      }

      @keyframes nextPageAnimation {
        from {
          transform: translateX(100%);
        }
        to {
          transform: translateX(0%);
        }
      }

      @view-transition {
        navigation: auto;
      }

      ::view-transition-old(root) {
        animation-name: backPageAnimation;
        animation-duration: 3s;
      }

      ::view-transition-new(root) {
        animation-name: nextPageAnimation;
        animation-duration: 3s;
      }
    </style>
  </head>
  <body>
    <div class="box"></div>
    <p>안녕하세요, 저는 철수입니다. 이곳은 상세 페이지 입니다</p>

  </body>
</html>
