<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>페이지 이동효과 실습</title>
    <style>
      .box {
        background-color: lightcoral;
        width: 1000px;
        height: 200px;
        margin: 10px;
      }

      @view-transition {
        navigation: auto;
      }

      @keyframes backPageAnimation {
        from {
          transform: translateX(0%);
        }

        to {
          transform: translateX(100%);
        }
      }

      ::view-transition-old(root) {
        animation: backPageAnimation 3s;
      }
    </style>
  </head>
  <body>
    <a href="./03_view_transition2_detail.html">페이지 이동하기</a>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
  </body>
</html>
