<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>쌓임맥락(부모 자녀)</title>
    <style>
      .floor {
        margin: 100px;
        padding: 100px;
        width: 1000px;
        height: 1000px;

        background-color: lightgray;

        position: relative;
      }

      .parent {
        width: 500px;
        height: 500px;
        background-color: lightblue;
      }

      /* 종이의 기준점이 parent class가 아닌 floor class이 된다. */
      .box {
        width: 300px;
        height: 300px;

        position: absolute;
      }

      .red {
        background-color: red;

        top: 0px;
        left: 0px;
      }

      .yellow {
        background-color: yellow;

        top: 25px;
        left: 25px;
      }

      .blue {
        background-color: blue;
        top: 50px;
        left: 50px;
      }
    </style>
  </head>
  <body>
    <div class="floor">
      <div class="parent">
        <div class="box red"></div>
        <div class="box yellow"></div>
        <div class="box blue"></div>
      </div>
    </div>
  </body>
</html>
