<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이벤트 버블링 PreventDefault 기능</title>
    <style>
      .photo {
        width: 300px;
        height: 300px;
        background-color: lightblue;
        border: 1px solid black;
      }
    </style>
  </head>
  <body>
    <a href="./01_event_bubbling_preventDefault2.html">
      <div class="photo">
        <button onclick="deletePhoto(event, 1)">1번 사진 삭제</button>
      </div>
    </a>
    <a href="./01_event_bubbling_preventDefault2.html">
      <div class="photo prevent-default">
        <button onclick="deletePhoto(event, 2)">2번 사진 삭제</button>
      </div>
    </a>
    <script>
      const deletePhoto = (e, num) => {
        // e.stopPropagation();
        if (num === 1) {
          e.preventDefault();
          alert(`${num}번 사진이 삭제되었습니다.`);
        } else {
          alert(`${num}번 사진이 삭제되었습니다.`);
        }
      };
    </script>
  </body>
</html>
