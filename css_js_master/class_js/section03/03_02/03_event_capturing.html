<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이벤트 캡처링 실습</title>
    <style>
      .box {
        width: 300px;
        height: 300px;
        background-color: lightblue;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="photo" class="box" onclick="photoSizeUp()">
      <button onclick="like(e)">좋아요</button>
    </div>
    <p>사진을 클릭하면 전체화면을 볼 수 있어요</p>
    <script>
      const photoSizeUp = () => {
        document.getElementById("photo").style = "width:500px; height: 500px";
        alert("사진이 확대 되었습니다.");
      };

      const like = (event) => {
        event.stopPropagation();
        alert("사진에 좋아요를 보냈습니다.");
      };

      const checkIfLogin = (event) => {
        event.stopPropagation();

        const pw = prompt("로그인 후 이용해 주세요.");
        if (pw === "1234") {
          document.documentElement.removeEventListener("click", checkIfLogin, {
            capture: true,
          });
        } else {
          alert("비밀번호가 틀렸습니다.");
        }
      };

      document.documentElement.addEventListener("click", checkIfLogin, {
        capture: true,
      });
    </script>
  </body>
</html>
