<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>스크롤 바닥 감지 실습</title>
  </head>
  <body>
    <img src="./img/puppy.jpeg" alt="" width="100%" />
    <script>
      window.addEventListener("scroll", () => {
        const 스크롤내려간길이 = document.documentElement.scrollTop; // = window.scrollY

        const 스크롤바길이 = document.documentElement.clientHeight; // 스크롤 바의 길이

        const 스크롤전체길이 = document.documentElement.scrollHeight; // 스크롤 전체 길이
        console.log(`스크롤전체길이: ${스크롤전체길이}`);
        console.log(
          `스크롤내려간길이 + 스크롤바길이: ${스크롤내려간길이 + 스크롤바길이}`
        );

        if (스크롤전체길이 === Math.ceil(스크롤내려간길이 + 스크롤바길이)) {
          alert("스크롤이 바닥에 닿았습니다.");
        }
      });
    </script>
  </body>
</html>
