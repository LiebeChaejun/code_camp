<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>페이지네이션 실습1 - 번호 나열하기</title>
    <script>
      const box = new Array(10).fill("box");

      const pages = box
        .map((item, idx) => {
          return `<button>${idx + 1}</button>`;
        })
        .join("");

      window.onload = () => {
        document.getElementById("page_shower").innerHTML = pages;
      };
    </script>
  </head>
  <body>
    <div id="page_shower"></div>
  </body>
</html>
