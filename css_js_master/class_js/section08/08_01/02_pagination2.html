<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이전 페이지, 다음 페이지 실습</title>
    <script>
      // 시작 페이지
      let startPage = 1;

      // 이전 페이지
      const prevPage = () => {
        startPage -= 10;
        drawPage();
      };

      // 다음 페이지
      const nextPage = () => {
        startPage += 10;
        drawPage();
      };

      // 페이지 그리기 기능
      const drawPage = () => {
        const box = new Array(10).fill("box");

        const pages = box
          .map((item, idx) => {
            return `<button>${startPage + idx}</button>`;
          })
          .join("");

        document.getElementById("page_shower").innerHTML = pages;
      };

      window.onload = () => {
        drawPage();
      };
    </script>
  </head>
  <body>
    <button onclick="prevPage()">이전페이지</button>
    <span id="page_shower"></span>
    <button onclick="nextPage()">다음페이지</button>
  </body>
</html>
