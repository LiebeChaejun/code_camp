<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>navigator: 클립보드</title>
    <script>
      const copyContent = () => {
        const content = document.getElementById("content").innerText;

        navigator.clipboard.writeText(content);

        alert(`복사되었습니다.
            내용: ${content}`);
      };

      const copyAndEditContent = () => {
        const content = document.getElementById("content").innerText;

        navigator.clipboard.writeText(`민지의 다이어리: ${content}`);

        alert(`복사되었습니다.
            내용: 민지의 다이어리: ${content}`);
      };
    </script>
  </head>
  <body>
    <div id="content">
      안녕하세요. 철수는 12살이고, 다람쥐초등학교에 재학중입니다.
    </div>
    <button onclick="copyContent()">내용복사하기</button
    ><button onclick="copyAndEditContent()">꾸며서 복사하기</button>
  </body>
</html>
