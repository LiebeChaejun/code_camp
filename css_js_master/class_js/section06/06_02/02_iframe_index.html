<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iframe 실습</title>
    <style>
      .banner {
        height: 100px;
        background-color: lightblue;
      }

      .navigation {
        height: 50px;
        background-color: lightcoral;
      }

      #frame {
        width: 500px;
        height: 700px;
      }
    </style>
    <script>
      const navigateMenu = (content) => {
        switch (content) {
          case "diary": {
            document.getElementById("frame").src = "./02_diary.html";
            break;
          }
          case "puppy": {
            document.getElementById("frame").src = "./02_puppy.html";
            break;
          }
          case "codecampPage": {
            document.getElementById("frame").src = "https://codebootcamp.co.kr";
          }
        }
      };
    </script>
  </head>
  <body>
    <div class="banner">배너 이미지 입니다.</div>
    <div class="navigation">
      <button onclick="navigateMenu('diary')">diary</button>
      <button onclick="navigateMenu('puppy')">puppy</button>
    </div>
    <iframe id="frame" src="./02_diary.html" frameborder="0"></iframe>
  </body>
</html>
