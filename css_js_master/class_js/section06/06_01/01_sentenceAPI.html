<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sentence api 실습</title>
    <script>
      const callSentence = () => {
        fetch("https://koreanjson.com/posts/1")
          .then((response) => response.json())
          .then((data) => {
            console.log(data);

            alert(data.title);
            alert(data.content);

            const title = data.title;

            console.log(`title: ${title}`);
          });
      };
    </script>
  </head>
  <body>
    <button onclick="callSentence()">문장 불러오기</button>
  </body>
</html>
