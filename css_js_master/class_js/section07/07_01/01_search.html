<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>검색 기능 구현 실습</title>
    <script>
      // 친구목록
      const list = ["짱구", "철수", "맹구", "훈이", "유리"];

      // 검색 기능
      const searchFriends = (event) => {
        const friend = event.target.value;
        console.log(friend);

        // 원하는 검색어가 포함된 결과 필터링
        const result = list.filter((el) => el.includes(friend));
        console.log("검색결과: ", result);

        // div태그에 검색 결과 렌더링
        document.getElementById("result").innerHTML = result;
      };
    </script>
  </head>
  <body>
    <input
      type="text"
      placeholder="친구를 검색하세요."
      oninput="searchFriends(event)"
    />

    <div id="result"></div>
  </body>
</html>
